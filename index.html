<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Secure Terminal</title>
    <style>
        body {
            margin: 0;
            background: #000;
            color: #0f0;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        #startScreen {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .container { text-align: center; }

        #pinDisplay {
            width: 300px;
            height: 50px;
            font-size: 30px;
            text-align: center;
            margin-bottom: 20px;
            background: #111;
            border: 1px solid #0f0;
            color: #0f0;
            letter-spacing: 5px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 80px);
            gap: 10px;
        }

        button {
            height: 70px;
            font-size: 20px;
            background: #111;
            border: 1px solid #333;
            color: #0f0;
            cursor: pointer;
        }

        button:active { background: #0f0; color: #000; }

        .btn-start {
            padding: 20px 40px;
            font-size: 24px;
            border: 2px solid #0f0;
        }
    </style>
</head>
<body>

<div id="startScreen">
    <button class="btn-start" onclick="startApp()">INITIALIZE SYSTEM</button>
</div>

<div class="container">
    <input id="pinDisplay" type="password" readonly>
    <div class="grid">
        <button onclick="addNum('1')">1</button>
        <button onclick="addNum('2')">2</button>
        <button onclick="addNum('3')">3</button>
        <button onclick="addNum('4')">4</button>
        <button onclick="addNum('5')">5</button>
        <button onclick="addNum('6')">6</button>
        <button onclick="addNum('7')">7</button>
        <button onclick="addNum('8')">8</button>
        <button onclick="addNum('9')">9</button>
        <button style="color:red" onclick="terminate()">C</button>
        <button onclick="addNum('0')">0</button>
        <button style="color:cyan" onclick="checkPin()">OK</button>
    </div>
</div>

<script>
    const correctPin = "13579246802014";
    const display = document.getElementById("pinDisplay");
    let active = false;

    function startApp() {
        document.documentElement.requestFullscreen().catch(() => {});
        document.getElementById("startScreen").style.display = "none";
        active = true;
    }

    function addNum(n) { display.value += n; }

    function checkPin() {
        if (display.value === correctPin) {
            alert("Authenticated.");
        } else {
            terminate();
        }
    }

    // This handles the "Self-Destruct"
    function terminate() {
        // Attempt to close the window
        window.close();
        
        // If window.close fails (browser security), wipe the entire DOM 
        // and force-exit fullscreen to break the app state
        if (document.fullscreenElement) {
            document.exitFullscreen();
        }
        document.body.innerHTML = "";
        document.body.style.background = "black";
        
        // Final attempt to kick them out
        location.replace("about:blank");
    }

    // Keyboard support
    document.addEventListener("keydown", (e) => {
        if (!active) return;
        if (e.key >= "0" && e.key <= "9") addNum(e.key);
        if (e.key === "Enter") checkPin();
        if (e.key === "Backspace") display.value = "";
    });

    // Detect if user tries to manually escape fullscreen
    document.addEventListener("fullscreenchange", () => {
        if (active && !document.fullscreenElement) {
            terminate();
        }
    });
</script>

</body>
</html>
