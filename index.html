<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Fullscreen PIN Demo</title>

<style>
body {
    margin: 0;
    background: #111;
    color: white;
    font-family: Arial;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    text-align: center;
}

#pinDisplay {
    width: 320px;
    height: 50px;
    font-size: 28px;
    text-align: center;
    margin-bottom: 20px;
    border-radius: 10px;
    border: none;
    background: #222;
    color: white;
}

.grid {
    display: grid;
    grid-template-columns: repeat(3, 80px);
    gap: 10px;
    justify-content: center;
}

button {
    height: 70px;
    font-size: 24px;
    border: none;
    border-radius: 12px;
    background: #333;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #555;
}

#startScreen {
    position: fixed;
    inset: 0;
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 999;
}
</style>
</head>

<body>

<div id="startScreen">
    <button onclick="startApp()" style="width:200px;height:100px;font-size:28px;">
        START
    </button>
</div>

<div class="container">
    <h1>Enter PIN</h1>

    <input id="pinDisplay" type="password" readonly>

    <div class="grid">
        <button onclick="addNum('1')">1</button>
        <button onclick="addNum('2')">2</button>
        <button onclick="addNum('3')">3</button>

        <button onclick="addNum('4')">4</button>
        <button onclick="addNum('5')">5</button>
        <button onclick="addNum('6')">6</button>

        <button onclick="addNum('7')">7</button>
        <button onclick="addNum('8')">8</button>
        <button onclick="addNum('9')">9</button>

        <button onclick="clearPin()">C</button>
        <button onclick="addNum('0')">0</button>
        <button onclick="checkPin()">OK</button>
    </div>
</div>

<script>
const correctPin = "13579246802014";

function startApp() {
    document.documentElement.requestFullscreen();
    document.getElementById("startScreen").style.display = "none";
}

function addNum(num) {
    document.getElementById("pinDisplay").value += num;
}

function clearPin() {
    document.getElementById("pinDisplay").value = "";
}

function checkPin() {
    const pin = document.getElementById("pinDisplay").value;

    if (pin === correctPin) {
        alert("Unlocked!");
    } else {
        alert("Wrong PIN");
        clearPin();
    }
}

document.addEventListener("fullscreenchange", () => {
    if (!document.fullscreenElement) {
        console.log("Exited fullscreen");
    }
});
</script>

</body>
</html>
