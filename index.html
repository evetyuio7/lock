<!DOCTYPE html>
<html>
<head>
  <title>Private Profile</title>
  <style>
    body {
      background: #111;
      color: white;
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .box {
      background: #1e1e1e;
      padding: 30px;
      border-radius: 16px;
      text-align: center;
      width: 300px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      border: none;
      border-radius: 8px;
      font-size: 18px;
      text-align: center;
    }

    button {
      margin-top: 15px;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: #444;
      color: white;
      cursor: pointer;
      font-size: 16px;
    }

    .error {
      color: red;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="box">
    <h2>Enter PIN</h2>
    <input type="password" id="pin" placeholder="PIN">
    <button onclick="checkPin()">Unlock</button>
    <div class="error" id="error"></div>
  </div>

  <script>
    const correctPin = "CHANGE_THIS";

    function checkPin() {
      const input = document.getElementById("pin").value;

      if (input === correctPin) {
        window.location.href = "https://google.com";
      } else {
        document.getElementById("error").innerText = "Wrong PIN";
      }
    }
  </script>
</body>
</html>
