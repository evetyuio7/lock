<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Fullscreen Terminal</title>
    <style>
        body {
            margin: 0;
            background: #111;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        .container {
            text-align: center;
        }

        #pinDisplay {
            width: 320px;
            height: 60px;
            font-size: 32px;
            text-align: center;
            margin-bottom: 25px;
            border-radius: 8px;
            border: 2px solid #444;
            background: #000;
            color: #0f0; /* Matrix green */
            letter-spacing: 8px;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.1);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 90px);
            gap: 15px;
            justify-content: center;
        }

        button {
            height: 80px;
            font-size: 24px;
            border: 1px solid #444;
            border-radius: 8px;
            background: #222;
            color: white;
            cursor: pointer;
            transition: all 0.1s;
        }

        button:hover {
            background: #333;
            border-color: #666;
        }

        button:active {
            background: #0f0;
            color: #000;
        }

        .btn-clear { background: #411; }
        .btn-ok { background: #141; }

        #startScreen {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }

        #startScreen button {
            width: 250px;
            height: 100px;
            font-size: 30px;
            background: #111;
            border: 2px solid #0f0;
            color: #0f0;
        }

        .warning-text {
            margin-top: 20px;
            color: #666;
            font-size: 14px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div id="startScreen">
    <button onclick="startApp()">INITIALIZE</button>
    <p class="warning-text">System will lock on fullscreen exit</p>
</div>

<div class="container">
    <h2 style="color: #888;">SECURE AUTHENTICATION</h2>
    <input id="pinDisplay" type="password" readonly placeholder="••••">

    <div class="grid">
        <button onclick="addNum('1')">1</button>
        <button onclick="addNum('2')">2</button>
        <button onclick="addNum('3')">3</button>

        <button onclick="addNum('4')">4</button>
        <button onclick="addNum('5')">5</button>
        <button onclick="addNum('6')">6</button>

        <button onclick="addNum('7')">7</button>
        <button onclick="addNum('8')">8</button>
        <button onclick="addNum('9')">9</button>

        <button class="btn-clear" onclick="clearPin()">C</button>
        <button onclick="addNum('0')">0</button>
        <button class="btn-ok" onclick="checkPin()">OK</button>
    </div>
</div>

<script>
    const correctPin = "13579246802014";
    const pinInput = document.getElementById("pinDisplay");
    let appStarted = false;

    // Triggered by the Start Button
    function startApp() {
        document.documentElement.requestFullscreen().catch(() => {
            alert("Permission denied. Fullscreen is required.");
        });
        document.getElementById("startScreen").style.display = "none";
        appStarted = true;
    }

    function addNum(num) {
        if (pinInput.value.length < 20) {
            pinInput.value += num;
        }
    }

    function clearPin() {
        pinInput.value = "";
    }

    function checkPin() {
        if (pinInput.value === correctPin) {
            alert("ACCESS GRANTED");
            // App remains in fullscreen
        } else {
            // WRONG PIN: Force an exit from fullscreen
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                // Handle case if they somehow aren't in fullscreen
                handleSecurityViolation();
            }
        }
    }

    // Keyboard support: Numbers, Enter to submit, Backspace to clear
    document.addEventListener("keydown", (e) => {
        if (!appStarted) return;

        if (e.key >= "0" && e.key <= "9") {
            addNum(e.key);
        } else if (e.key === "Enter") {
            checkPin();
        } else if (e.key === "Backspace") {
            clearPin();
        }
    });

    // Security Tripwire: Fires when fullscreen is exited for ANY reason
    document.addEventListener("fullscreenchange", () => {
        if (appStarted && !document.fullscreenElement) {
            handleSecurityViolation();
        }
    });

    function handleSecurityViolation() {
        // Attempt to close the tab
        window.close();

        // Immediate UI lockout (if tab closing is blocked by browser)
        document.body.innerHTML = `
            <div style="background:#000; color:#ff0000; height:100vh; width:100vw; 
                 display:flex; flex-direction:column; justify-content:center; 
                 align-items:center; font-family:monospace; text-align:center;">
                <h1 style="font-size: 50px; border: 5px solid red; padding: 20px;">
                    LOCKOUT ACTIVATED
                </h1>
                <p style="font-size: 20px;">INVALID PIN OR MANUAL ESCAPE DETECTED.</p>
                <p style="color: #444;">Session has been terminated for security.</p>
                <button onclick="location.reload()" 
                        style="margin-top:20px; background:transparent; color:red; 
                        border:1px solid red; padding:10px 20px; cursor:pointer;">
                    RESTART SYSTEM
                </button>
            </div>`;
    }
</script>

</body>
</html>
